<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milan Picker</title>

<style>
body{
font-family:"Pretendard",Arial,sans-serif;
background:#fafafa;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:16px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
background:#4b6cb7;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#395591;
}

#output,#output2{
font-size:1.4rem;
font-weight:bold;
color:#333;
min-height:2rem;
}

#copyMessage{
color:green;
font-size:0.9rem;
visibility:hidden;
}
</style>
</head>

<body>

<h1>CeMil Picker</h1>

<button onclick="pickMilan()">Pick Milan</button>
<div id="output">–</div>

<button onclick="pickCesar()">Pick Cesar</button>
<div id="output2">–</div>

<button onclick="copyResult()">Copy Result</button>

<div id="copyMessage">Copied!</div>

<script>

let lastMessage=''

function formatDate(){

const now=new Date()
const year=now.getFullYear()
const month=now.getMonth()+1
const day=now.getDate()

let hour=now.getHours()
const minute=String(now.getMinutes()).padStart(2,'0')

const ampm=hour>=12?'오후':'오전'

if(hour>12)hour-=12
if(hour===0)hour=12

return `[${year}년 ${month}월 ${day}일 ${ampm}${hour}:${minute}]`

}

function pickMilan(){

const options=['원본밀','시칠밀','향밀','마탑밀','차이나밀','회사밀','고딩밀']
const randomValue=options[Math.floor(Math.random()*options.length)]

const message=`${formatDate()} 당신이 뽑은 밀란은 ${randomValue}`

lastMessage=message
document.getElementById('output').textContent=message

}

function pickCesar(){

const letters=['원본세','시칠세','향세','마탑주','차이나세','이사님','고딩세','!!레어!!세베르!!']
const randomCesar=letters[Math.floor(Math.random()*letters.length)]

const message=`${formatDate()} 당신이 뽑은 세자르는 ${randomCesar}`

lastMessage=message
document.getElementById('output2').textContent=message

}

async function copyResult(){

if(!lastMessage)return alert('먼저 하나를 뽑아주세요!')

try{

await navigator.clipboard.writeText(lastMessage)

const msg=document.getElementById('copyMessage')
msg.style.visibility='visible'
msg.textContent='복사 완료!'

setTimeout(()=>msg.style.visibility='hidden',1500)

}catch(err){

alert('복사 실패 😢')

}

}

</script>

</body>
</html>
